<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />

    <script>
      // Set the theme before first paint to avoid a flash. A stored choice
      // wins; otherwise fall back to the system preference. Same key as the
      // product viewer so a visitor's desk preference carries over.
      try {
        var stored = localStorage.getItem('desk-theme');
        document.documentElement.dataset.theme =
          stored === 'dark' || stored === 'light'
            ? stored
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
      } catch (_) {
        document.documentElement.dataset.theme = 'light';
      }
    </script>

    <title>Desk — a visual channel between you and your AI agent</title>
    <meta
      name="description"
      content="Your agent renders real artifacts — diagrams, charts, slides, tables — instead of describing them, and you reply by pointing at the part that's wrong. Local-first, MCP-native."
    />
    <link rel="canonical" href="https://alireza29675.github.io/desk/" />

    <!-- Open Graph / social. og:image is produced from a real desk capture
         after R2+R3 land on main (1280×640, < 1MB). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Desk" />
    <meta property="og:url" content="https://alireza29675.github.io/desk/" />
    <meta property="og:title" content="Desk — see what your agent means" />
    <meta
      property="og:description"
      content="Your agent shows you the diagram instead of describing it — and you reply by pointing at the part that's wrong."
    />
    <meta property="og:image" content="https://alireza29675.github.io/desk/og/og.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Desk — see what your agent means" />
    <meta
      name="twitter:description"
      content="Your agent shows you the diagram instead of describing it — and you reply by pointing at the part that's wrong."
    />
    <meta name="twitter:image" content="https://alireza29675.github.io/desk/og/og.png" />

    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />

    <!-- The product's coral desk mark — rounded square, three lines. Inline so
         it needs no asset. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23FF5A4D'/%3E%3Cpath d='M9 11h14M9 16h10M9 21h7' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
