<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />

    <meta name="theme-color" content="#fafafa" />
    <script>
      // Set the theme before first paint to avoid a flash. A stored choice
      // wins; otherwise fall back to the system preference. Same key NAME as
      // the product viewer (a convention, not shared storage — localStorage is
      // origin-scoped). The theme-color meta above follows the resolved theme,
      // not the OS preference; the toggle keeps it in sync at runtime.
      try {
        var stored = localStorage.getItem('desk-theme');
        var theme =
          stored === 'dark' || stored === 'light'
            ? stored
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.dataset.theme = theme;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0a0b' : '#fafafa');
        // Preload the visible hero capture (theme is known here, viewport via
        // media) so the LCP fetch starts at parse time — this is a CSR page,
        // and img-discovery otherwise waits for the bundle. Hidden variants
        // load eager-but-auto from the <img> tags; only these get priority.
        [
          ['(min-width: 721px)', 'hero-desktop-'],
          ['(max-width: 720px)', 'hero-mobile-'],
        ].forEach(function (p) {
          var l = document.createElement('link');
          l.rel = 'preload';
          l.as = 'image';
          l.href = '%BASE_URL%captures/' + p[1] + theme + '.png';
          l.media = p[0];
          l.setAttribute('fetchpriority', 'high');
          document.head.appendChild(l);
        });
      } catch (_) {
        document.documentElement.dataset.theme = 'light';
      }
    </script>

    <title>Desk — a visual channel between you and your AI agent</title>
    <meta
      name="description"
      content="Your agent renders real artifacts — diagrams, charts, slides, tables — instead of describing them, and you reply by pointing at the part that's wrong. Local-first, MCP-native."
    />
    <link rel="canonical" href="https://alireza29675.github.io/desk/" />

    <!-- Open Graph / social. og:image is a real desk capture rendered through
         /og.html, committed at public/og/og.png (1280×640, < 1MB). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Desk" />
    <meta property="og:url" content="https://alireza29675.github.io/desk/" />
    <meta property="og:title" content="Desk — see what your agent means" />
    <meta
      property="og:description"
      content="Your agent shows you the diagram instead of describing it — and you reply by pointing at the part that's wrong."
    />
    <meta property="og:image" content="https://alireza29675.github.io/desk/og/og.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Desk — see what your agent means" />
    <meta
      name="twitter:description"
      content="Your agent shows you the diagram instead of describing it — and you reply by pointing at the part that's wrong."
    />
    <meta name="twitter:image" content="https://alireza29675.github.io/desk/og/og.png" />

    <!-- The product's coral desk mark — rounded square, three lines. Inline so
         it needs no asset. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23FF5A4D'/%3E%3Cpath d='M9 11h14M9 16h10M9 21h7' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
